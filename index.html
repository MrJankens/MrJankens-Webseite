<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>L & K | 19.02.2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; min-height: 100vh; overflow: hidden; }

        /* LOGIN */
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.6s ease, visibility 0.6s ease; }
        #login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-container { background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .login-heart { font-size: 4rem; margin-bottom: 15px; display: inline-block; animation: heartbeat 1.4s infinite ease-in-out; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.15); } 40% { transform: scale(1.05); } 60% { transform: scale(1.15); } }
        .login-title { font-size: 1.5rem; font-weight: 800; color: #4a154b; margin-bottom: 5px; }
        .login-subtitle { font-size: 0.9rem; color: #888; margin-bottom: 25px; }
        .login-input { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; margin-bottom: 12px; outline: none; transition: border-color 0.3s; background: #fafafa; }
        .login-input:focus { border-color: #d11a5b; background: #fff; }
        .login-input.error { border-color: #ff4444; animation: shake 0.4s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #ff4081, #d11a5b); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(209, 26, 91, 0.3); transition: all 0.2s ease; }
        .login-btn:hover { transform: translateY(-2px); }
        .login-error { color: #ff4444; font-size: 0.85rem; margin-top: 10px; min-height: 20px; font-weight: 600; }
        .stay-logged { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; font-size: 0.9rem; color: #555; }
        .stay-logged input[type="checkbox"] { width: 18px; height: 18px; accent-color: #d11a5b; cursor: pointer; }
        .stay-logged label { cursor: pointer; user-select: none; }

        /* SPLASH */
        #welcome-splash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; justify-content: center; align-items: center; z-index: 999999; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.6s ease, visibility 0.6s ease; }
        #welcome-splash.visible { opacity: 1; visibility: visible; }
        #welcome-splash.fade-out { opacity: 0; }
        .splash-content { text-align: center; animation: splashPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes splashPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .splash-heart { font-size: 6rem; margin-bottom: 20px; display: inline-block; animation: heartbeat 1.4s infinite ease-in-out; }
        .splash-text { font-size: 2rem; font-weight: 800; color: white; text-shadow: 0 0 30px rgba(255, 255, 255, 0.5); }
        .splash-name { color: #ff6b9d; }

        /* LOVE CARD */
        #love-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(135deg, #ffeef8 0%, #ffd1dc 50%, #fbc2eb 100%); display: flex; justify-content: center; align-items: center; z-index: 9999999; overflow: hidden; opacity: 0; visibility: hidden; transition: opacity 0.8s ease, visibility 0.8s ease; }
        #love-overlay.visible { opacity: 1; visibility: visible; }
        .love-card { background: rgba(255, 255, 255, 0.95); border-radius: 24px; padding: 40px 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(253, 114, 148, 0.3); border: 1px solid rgba(255, 255, 255, 0.8); position: relative; z-index: 10; animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; user-select: none; -webkit-user-select: none; }
        .love-card * { user-select: none; -webkit-user-select: none; cursor: default; }
        .btn-3d { transition: all 0.2s ease; cursor: pointer; }
        .btn-3d:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 25px rgba(209, 26, 91, 0.5); }
        .main-heart { font-size: 5rem; margin-bottom: 10px; display: inline-block; animation: heartbeat 1.4s infinite ease-in-out; cursor: pointer; }
        .initials { font-size: 2.5rem; font-weight: 800; color: #d11a5b; letter-spacing: 2px; margin-bottom: 5px; }
        .date-badge { display: inline-block; background: #d11a5b; color: white; padding: 5px 15px; border-radius: 20px; font-size: 1rem; font-weight: 600; margin-bottom: 15px; }
        .message { font-size: 1.5rem; font-weight: 700; color: #4a154b; margin-bottom: 15px; }
        .counter { font-size: 0.95rem; color: #615061; background: rgba(255, 255, 255, 0.8); padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .counter strong { color: #d11a5b; font-size: 1.05rem; display: block; margin-top: 4px; }
        .love-btn { background: linear-gradient(45deg, #ff4081, #d11a5b); color: white; border: none; padding: 12px 28px; font-size: 1rem; font-weight: 600; border-radius: 50px; box-shadow: 0 5px 15px rgba(209, 26, 91, 0.3); }
        .secret-msg { margin-top: 15px; font-size: 1rem; font-weight: 600; color: #d11a5b; min-height: 25px; transition: opacity 0.3s ease; opacity: 0; }
        .logout-btn { position: absolute; top: 15px; right: 15px; background: rgba(209, 26, 91, 0.1); color: #d11a5b; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; transition: all 0.2s ease; z-index: 20; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .logout-btn:hover { background: #d11a5b; color: white; transform: scale(1.1); }
        .gallery-btn { background: rgba(209, 26, 91, 0.1); color: #d11a5b; border: none; padding: 10px 20px; font-size: 0.95rem; font-weight: 600; border-radius: 50px; margin-top: 15px; cursor: pointer; }
        .falling-heart { position: absolute; top: -5%; user-select: none; pointer-events: none; animation: fall linear forwards; z-index: 1; }
        @keyframes fall { 0% { transform: translateY(-10%) rotate(0deg); opacity: 0.9; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes burstUp { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-50vh) translateX(var(--bx)) rotate(var(--br)); opacity: 0; } }

        /* GALERIE - iPHONE STYLE */
        #gallery-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 99999999; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; }
        #gallery-view.visible { opacity: 1; visibility: visible; }
        .g-topbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(28,28,30,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .g-title { color: white; font-size: 1.1rem; font-weight: 700; }
        .g-add-btn { background: none; border: none; color: #007AFF; font-size: 1.8rem; font-weight: 300; cursor: pointer; line-height: 1; padding: 0 5px; }
        .g-back { background: none; border: none; color: #007AFF; font-size: 0.95rem; cursor: pointer; padding: 0 5px; white-space: nowrap; }
        .g-content { flex: 1; overflow-y: auto; background: #000; padding: 15px; }
        .g-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .g-photo { position: relative; aspect-ratio: 1; cursor: pointer; overflow: hidden; }
        .g-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
        .g-photo:hover img { transform: scale(1.05); }
        .g-photo-author { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; padding: 10px 8px 6px; font-size: 0.7rem; font-weight: 600; }
        .g-photo-delete { position: absolute; top: 5px; right: 5px; background: rgba(255,50,50,0.8); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; font-size: 0.7rem; cursor: pointer; opacity: 0; transition: opacity 0.2s; display: flex; justify-content: center; align-items: center; }
        .g-photo:hover .g-photo-delete { opacity: 1; }
        .g-empty { grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.3); }
        .g-empty-icon { font-size: 4rem; margin-bottom: 10px; }
        .g-loading { grid-column: 1 / -1; text-align: center; padding: 80px; color: rgba(255,255,255,0.5); }
        #file-input { display: none; }

        /* CHAT */
        #chat-view { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 99999999; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; }
        #chat-view.visible { opacity: 1; visibility: visible; }
        .c-topbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(28,28,30,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 0.5px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .c-topbar-title { color: white; font-size: 1.1rem; font-weight: 700; }
        .c-back { background: none; border: none; color: #007AFF; font-size: 0.95rem; cursor: pointer; padding: 0 5px; white-space: nowrap; }
        .c-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #000; }
        .c-msg { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; position: relative; animation: msgIn 0.25s ease-out; }
        @keyframes msgIn { 0% { transform: translateY(10px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .c-msg.mine { background: #0b93f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .c-msg.theirs { background: #262626; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .c-msg-author { font-size: 0.7rem; font-weight: 700; margin-bottom: 3px; opacity: 0.7; }
        .c-msg-text { margin: 0; }
        .c-msg-time { font-size: 0.65rem; opacity: 0.55; margin-top: 4px; text-align: right; }
        .c-msg-media { margin: 6px 0 2px; cursor: pointer; }
        .c-msg-media img { max-width: 100%; max-height: 250px; border-radius: 10px; object-fit: cover; display: block; }
        .c-msg-media video { max-width: 100%; max-height: 250px; border-radius: 10px; display: block; }
        .c-msg-delete { position: absolute; top: 4px; right: 6px; background: rgba(0,0,0,0.4); color: white; border: none; width: 20px; height: 20px; border-radius: 50%; font-size: 0.6rem; cursor: pointer; opacity: 0; transition: opacity 0.2s; display: flex; justify-content: center; align-items: center; }
        .c-msg:hover .c-msg-delete { opacity: 1; }
        .c-empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
        .c-empty-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .c-input-bar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: rgba(28,28,30,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .c-attach { background: none; border: none; color: #007AFF; font-size: 1.5rem; cursor: pointer; padding: 4px; line-height: 1; flex-shrink: 0; }
        .c-text { flex: 1; background: #1c1c1e; color: white; border: none; border-radius: 20px; padding: 10px 16px; font-size: 0.95rem; outline: none; resize: none; max-height: 100px; line-height: 1.4; }
        .c-text::placeholder { color: rgba(255,255,255,0.3); }
        .c-send { background: #0b93f6; color: white; border: none; width: 34px; height: 34px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; transition: background 0.2s; }
        .c-send:disabled { background: #333; cursor: default; }
        #chat-file-input { display: none; }

        /* 1X ANSEHEN */
        .c-once-btn { background: none; border: none; color: #ff9500; font-size: 0.75rem; cursor: pointer; padding: 2px 6px; border-radius: 10px; white-space: nowrap; transition: all 0.2s; }
        .c-once-btn.active { background: #ff9500; color: white; }
        .c-msg-once-badge { display: inline-block; background: #ff9500; color: white; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; margin-bottom: 4px; }
        .c-msg-once-btn { background: #ff9500; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-top: 6px; transition: all 0.2s; }
        .c-msg-once-btn:hover { transform: scale(1.05); }
        #once-viewer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.97); z-index: 999999999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        #once-viewer.visible { opacity: 1; visibility: visible; }
        .once-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 1.4rem; cursor: pointer; z-index: 10; }
        .once-badge { position: absolute; top: 20px; left: 20px; background: #ff9500; color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; z-index: 10; }
        .once-content { max-width: 92vw; max-height: 75vh; display: flex; justify-content: center; align-items: center; position: relative; }
        .once-content canvas { max-width: 100%; max-height: 75vh; border-radius: 4px; }
        .once-content img { max-width: 100%; max-height: 75vh; object-fit: contain; border-radius: 4px; }
        .once-timer { color: #ff9500; font-size: 1rem; font-weight: 700; margin-top: 10px; }
        .once-hinweis { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-top: 8px; }
        .once-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px); }

        /* LIGHTBOX */
        #lightbox { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.97); z-index: 999999999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; cursor: pointer; }
        #lightbox.visible { opacity: 1; visibility: visible; }
        #lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 4px; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.2); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 1.4rem; cursor: pointer; }
        .lightbox-info { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 0.85rem; background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; white-space: nowrap; }

        /* MOBILE RESPONSIVE */
        @media (max-width: 480px) {
            .login-container { padding: 30px 20px; width: 92%; }
            .login-heart { font-size: 3rem; }
            .login-title { font-size: 1.3rem; }
            .login-input { padding: 12px 14px; font-size: 0.95rem; }
            .love-card { padding: 35px 18px; width: 94%; border-radius: 20px; }
            .main-heart { font-size: 4rem; }
            .initials { font-size: 2rem; }
            .message { font-size: 1.2rem; }
            .counter { font-size: 0.85rem; padding: 10px; }
            .counter strong { font-size: 0.95rem; }
            .love-btn { padding: 10px 22px; font-size: 0.9rem; }
            .gallery-btn { padding: 8px 16px; font-size: 0.85rem; }
            .g-topbar { padding: 12px 15px; padding-top: calc(12px + env(safe-area-inset-top, 0px)); }
            .g-content { padding: 10px; }
            .g-grid { gap: 2px; }
            .g-empty { padding: 50px 15px; }
            .c-topbar { padding: 12px 15px; padding-top: calc(12px + env(safe-area-inset-top, 0px)); }
            .c-messages { padding: 10px; }
            .c-msg { max-width: 85%; font-size: 0.9rem; padding: 8px 12px; }
            .c-input-bar { padding: 8px 10px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px)); gap: 6px; }
            .c-text { padding: 8px 12px; font-size: 0.9rem; }
            .c-send { width: 32px; height: 32px; font-size: 1rem; }
            .c-attach, .c-once-btn { font-size: 1.3rem; padding: 3px; }
            .c-once-btn.active { padding: 2px 5px; }
            .once-badge { top: 15px; left: 15px; padding: 5px 12px; font-size: 0.8rem; }
            .once-close { top: 15px; right: 15px; width: 38px; height: 38px; font-size: 1.2rem; }
            .once-content { max-width: 96vw; max-height: 70vh; }
            .once-timer { font-size: 0.9rem; }
            .once-hinweis { font-size: 0.7rem; }
            .c-msg-delete { width: 18px; height: 18px; font-size: 0.55rem; }
            .c-msg-once-btn { padding: 6px 12px; font-size: 0.8rem; }
            .splash-heart { font-size: 4rem; }
            .splash-text { font-size: 1.5rem; }
        }

        @media (max-height: 600px) {
            .love-card { padding: 25px 15px; }
            .main-heart { font-size: 3rem; }
            .initials { font-size: 1.8rem; }
            .message { font-size: 1.1rem; margin-bottom: 10px; }
            .counter { padding: 8px; margin-bottom: 12px; }
            .love-btn { padding: 8px 20px; }
            .gallery-btn { padding: 7px 14px; margin-top: 10px; }
            .c-topbar { padding: 8px 15px; }
            .c-input-bar { padding: 6px 10px; }
        }
    </style>
</head>
<body>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <div id="login-screen">
        <div class="login-container">
            <div class="login-heart">❤️</div>
            <div class="login-title">Willkommen zurück</div>
            <div class="login-subtitle">Melde dich an um fortzufahren</div>
            <input type="text" class="login-input" id="username" placeholder="Benutzername" autocomplete="off">
            <input type="password" class="login-input" id="password" placeholder="Passwort">
            <div class="stay-logged">
                <input type="checkbox" id="stay-logged">
                <label for="stay-logged">Auf diesem Gerät angemeldet bleiben</label>
            </div>
            <button class="login-btn" id="login-btn">Anmelden 💖</button>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <div id="welcome-splash">
        <div class="splash-content">
            <div class="splash-heart">❤️</div>
            <div class="splash-text">Willkommen, <span class="splash-name" id="splash-name"></span>! 💕</div>
        </div>
    </div>

    <div id="love-overlay">
        <div id="hearts-bg"></div>
        <div class="love-card">
            <button class="logout-btn btn-3d" id="logout-btn" title="Abmelden">⏻</button>
            <div class="main-heart" id="pulsing-heart">❤️</div>
            <div class="initials">L ♥ K</div>
            <div class="date-badge">19.02.2026</div>
            <div class="message">Ich liebe dich!</div>
            <div class="counter" id="timer">Berechne unsere Zeit...</div>
            <button class="love-btn btn-3d" id="surprise-btn">Drück mich! 💖</button>
            <button class="gallery-btn btn-3d" id="open-gallery">📷 Unsere Galerie</button>
            <button class="gallery-btn btn-3d" id="open-chat" style="margin-top:10px;">💬 Unser Chat</button>
            <div class="secret-msg" id="secret-text"></div>
        </div>
    </div>

    <div id="gallery-view">
        <div class="g-topbar">
            <button class="g-back" id="g-back">← Zurück</button>
            <div class="g-title">📷 Unsere Galerie</div>
            <button class="g-add-btn" id="g-add-btn" title="Foto/Video hochladen">+</button>
        </div>
        <div class="g-content" id="g-content">
            <div class="g-loading">Lade Fotos...</div>
        </div>
    </div>

    <div id="chat-view">
        <div class="c-topbar">
            <button class="c-back" id="c-back">← Zurück</button>
            <div class="c-topbar-title">💬 Unser Chat</div>
            <div style="width:60px;"></div>
        </div>
        <div class="c-messages" id="c-messages">
            <div class="c-empty"><div class="c-empty-icon">💬</div>Noch keine Nachrichten.<br>Starte das Gespräch!</div>
        </div>
        <div class="c-input-bar">
            <button class="c-attach" id="c-attach" title="Foto/Video senden">+</button>
            <button class="c-once-btn" id="c-once" title="1x ansehen">👁️</button>
            <input type="text" class="c-text" id="c-text" placeholder="Nachricht..." autocomplete="off">
            <button class="c-send" id="c-send">➤</button>
        </div>
    </div>

    <div id="once-viewer">
        <button class="once-close" id="once-close">✕</button>
        <div class="once-badge">👁️ 1x ansehen</div>
        <div class="once-content" id="once-content"></div>
        <div class="once-timer" id="once-timer"></div>
        <div class="once-hinweis">Dieses Bild kann nur 1x angesehen werden.</div>
    </div>

    <input type="file" id="chat-file-input" accept="image/*,video/*">

    <div id="lightbox">
        <button class="lightbox-close">✕</button>
        <img src="" alt="" id="lightbox-img" style="display:none;">
        <video src="" controls id="lightbox-video" style="display:none; max-width:92vw; max-height:88vh; border-radius:4px;"></video>
        <div class="lightbox-info" id="lightbox-info"></div>
    </div>

    <input type="file" id="file-input" accept="image/*,video/*">

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // FIREBASE
        firebase.initializeApp({
            apiKey: "AIzaSyDer6-69o8uYbyYQmL6xeBz7_B3j_oTMVI",
            authDomain: "lxk-love.firebaseapp.com",
            projectId: "lxk-love",
            storageBucket: "lxk-love.firebasestorage.app",
            messagingSenderId: "996365536008",
            appId: "1:996365536008:web:7c2d7803bbaaf2d3953abd"
        });
        const db = firebase.database();
        const photosRef = db.ref('photos');

        // LOGIN
        const accounts = { kevin: "KevinLea0909", lea: "KevinLea0909" };
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const loginScreen = document.getElementById('login-screen');
        const stayLoggedCheck = document.getElementById('stay-logged');
        const welcomeSplash = document.getElementById('welcome-splash');
        const splashName = document.getElementById('splash-name');
        const loveOverlay = document.getElementById('love-overlay');
        let currentUser = null;

        const savedUser = localStorage.getItem('lk_user');
        if (savedUser && accounts[savedUser]) {
            loginScreen.classList.add('hidden');
            showSplash(savedUser);
            return;
        }

        function attemptLogin() {
            const user = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;
            if (accounts[user] && accounts[user] === pass) {
                if (stayLoggedCheck.checked) localStorage.setItem('lk_user', user);
                loginScreen.classList.add('hidden');
                showSplash(user);
            } else {
                loginError.textContent = 'Benutzername oder Passwort ist falsch.';
                usernameInput.classList.add('error');
                passwordInput.classList.add('error');
                setTimeout(() => { usernameInput.classList.remove('error'); passwordInput.classList.remove('error'); }, 500);
                passwordInput.value = '';
            }
        }
        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
        usernameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordInput.focus(); });

        function showSplash(user) {
            splashName.textContent = user.charAt(0).toUpperCase() + user.slice(1);
            welcomeSplash.classList.add('visible');
            setTimeout(() => {
                welcomeSplash.classList.add('fade-out');
                setTimeout(() => {
                    welcomeSplash.classList.remove('visible', 'fade-out');
                    loveOverlay.classList.add('visible');
                    currentUser = user;
                    initLoveCard();
                }, 600);
            }, 2000);
        }

        function initLoveCard() {
            // Zähler
            const startDate = new Date('2026-02-19T00:00:00');
            function updateCounter() {
                const diff = new Date() - startDate;
                const isFuture = diff < 0;
                const absDiff = Math.abs(diff);
                const d = Math.floor(absDiff / 86400000);
                const h = Math.floor((absDiff % 86400000) / 3600000);
                const m = Math.floor((absDiff % 3600000) / 60000);
                const s = Math.floor((absDiff % 60000) / 1000);
                document.getElementById('timer').innerHTML = isFuture
                    ? `Noch bis zu unserem Tag: <strong>${d} Tage, ${h} Std, ${m} Min, ${s} Sek</strong>`
                    : `Wir sind glücklich zusammen seit: <strong>${d} Tagen, ${h} Std, ${m} Min, ${s} Sek</strong>`;
            }
            setInterval(updateCounter, 1000);
            updateCounter();

            // Herzen
            const heartsBg = document.getElementById('hearts-bg');
            function createFallingHeart() {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerHTML = ['❤️','💖','💝','💕','🌸','✨'][Math.floor(Math.random()*6)];
                heart.style.left = Math.random()*100+'vw';
                const dur = Math.random()*3+4;
                heart.style.animationDuration = dur+'s';
                heart.style.fontSize = (Math.random()*15+12)+'px';
                heartsBg.appendChild(heart);
                setTimeout(()=>heart.remove(), dur*1000);
            }
            setInterval(createFallingHeart, 350);

            // Überraschung
            const msgs = ["Du bist mein absoluter Lieblingsmensch! 🥰","Jeder Tag mit dir ist mein Lieblingstag. 🌸","L + K = Für immer und ewig! 🔐","Danke, dass es dich gibt! ❤️","Du machst meine Welt so viel bunter! 🌈","Mein Herz schlägt nur für dich! 💑"];
            function startSurprise() {
                const st = document.getElementById('secret-text');
                st.style.opacity = 0;
                setTimeout(()=>{ st.innerHTML = msgs[Math.floor(Math.random()*msgs.length)]; st.style.opacity=1; }, 200);
                for(let i=0;i<8;i++) createBurstHeart();
            }
            document.getElementById('surprise-btn').addEventListener('click', startSurprise);
            document.getElementById('pulsing-heart').addEventListener('click', startSurprise);

            function createBurstHeart() {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerHTML = ['❤️','💖','💕'][Math.floor(Math.random()*3)];
                heart.style.left = (Math.random()*60+20)+'vw';
                heart.style.top = '75%';
                const dur = Math.random()*1.5+1.5;
                heart.style.animationDuration = dur+'s';
                heart.style.setProperty('--bx',(Math.random()-0.5)*100+'px');
                heart.style.setProperty('--br',(Math.random()-0.5)*360+'deg');
                heart.style.animation = 'none';
                setTimeout(()=>{ heart.style.animation=`burstUp ${dur}s ease-out forwards`; }, 10);
                heartsBg.appendChild(heart);
                setTimeout(()=>heart.remove(), dur*1000);
            }

            // Logout
            document.getElementById('logout-btn').addEventListener('click', function() {
                loveOverlay.classList.remove('visible');
                localStorage.removeItem('lk_user');
                currentUser = null;
                setTimeout(()=>{ loginScreen.classList.remove('hidden'); usernameInput.value=''; passwordInput.value=''; loginError.textContent=''; }, 800);
            });

            // GALERIE
            const galleryView = document.getElementById('gallery-view');
            const gContent = document.getElementById('g-content');
            const gAddBtn = document.getElementById('g-add-btn');
            const fileInput = document.getElementById('file-input');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxVideo = document.getElementById('lightbox-video');
            const lightboxInfo = document.getElementById('lightbox-info');
            const gBack = document.getElementById('g-back');

            gBack.addEventListener('click', () => {
                galleryView.classList.remove('visible');
                history.back();
                renderGallery();
            });

            function isVideo(data) {
                return data && data.startsWith('data:video/');
            }

            function renderGallery() {
                gContent.innerHTML = '<div class="g-loading">Lade Inhalte...</div>';
                photosRef.get().then(snapshot => {
                    const items = [];
                    if (snapshot.exists()) {
                        snapshot.forEach(child => {
                            const val = child.val();
                            if (val && val.data) {
                                items.push({ id: child.key, data: val.data, author: val.author || 'Unbekannt', date: val.date || '', type: isVideo(val.data) ? 'video' : 'photo' });
                            }
                        });
                    }
                    items.reverse();
                    gContent.innerHTML = '';
                    if (items.length === 0) {
                        gContent.innerHTML = '<div class="g-empty"><div class="g-empty-icon">📷</div>Noch keine Inhalte.<br>Drück auf + um ein Foto oder Video hochzuladen.</div>';
                        return;
                    }
                    const grid = document.createElement('div');
                    grid.className = 'g-grid';
                    items.forEach(item => {
                        const el = document.createElement('div');
                        el.className = 'g-photo';
                        if (item.type === 'video') {
                            el.innerHTML = `<img src="${item.data}" alt="" style="object-fit:cover;"><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;opacity:0.9;pointer-events:none;">▶</div><div class="g-photo-author">🎥 ${item.author.charAt(0).toUpperCase()+item.author.slice(1)}</div><button class="g-photo-delete" data-id="${item.id}">✕</button>`;
                        } else {
                            el.innerHTML = `<img src="${item.data}" alt=""><div class="g-photo-author">📷 ${item.author.charAt(0).toUpperCase()+item.author.slice(1)}</div><button class="g-photo-delete" data-id="${item.id}">✕</button>`;
                        }
                        el.addEventListener('click', (e) => {
                            if (e.target.closest('.g-photo-delete')) return;
                            lightboxImg.style.display = 'none';
                            lightboxVideo.style.display = 'none';
                            if (item.type === 'video') {
                                lightboxVideo.src = item.data;
                                lightboxVideo.style.display = 'block';
                            } else {
                                lightboxImg.src = item.data;
                                lightboxImg.style.display = 'block';
                            }
                            const icon = item.type === 'video' ? '🎥' : '📷';
                            lightboxInfo.textContent = `${icon} ${item.author.charAt(0).toUpperCase()+item.author.slice(1)} · ${item.date}`;
                            lightbox.classList.add('visible');
                        });
                        grid.appendChild(el);
                    });
                    gContent.appendChild(grid);
                    gContent.querySelectorAll('.g-photo-delete').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (confirm('Inhalt löschen?')) {
                                photosRef.child(btn.dataset.id).remove().then(() => renderGallery());
                            }
                        });
                    });
                }).catch(err => {
                    console.error('GALLERY ERROR:', err);
                    gContent.innerHTML = `<div class="g-empty"><div class="g-empty-icon">⚠️</div>Fehler: ${err.message}</div>`;
                });
            }

            gAddBtn.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const maxSize = file.type.startsWith('video/') ? 15*1024*1024 : 5*1024*1024;
                if (file.size > maxSize) {
                    alert(file.type.startsWith('video/') ? 'Max. 15MB für Videos!' : 'Max. 5MB für Fotos!');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const photoData = ev.target.result;
                    const type = file.type.startsWith('video/') ? '🎥' : '📷';
                    console.log('Upload starte:', type, 'Datenlänge:', photoData.length);
                    photosRef.push({
                        data: photoData,
                        author: currentUser,
                        date: new Date().toLocaleDateString('de-DE')
                    }).then(() => {
                        console.log('Upload erfolgreich!');
                        renderGallery();
                    }).catch(err => {
                        console.error('Upload Fehler:', err);
                        alert('Fehler beim Hochladen: ' + err.message);
                    });
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            });

            document.querySelector('.lightbox-close').addEventListener('click', () => {
                lightbox.classList.remove('visible');
                lightboxVideo.pause();
                lightboxVideo.src = '';
            });
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    lightbox.classList.remove('visible');
                    lightboxVideo.pause();
                    lightboxVideo.src = '';
                }
            });

            document.getElementById('open-gallery').addEventListener('click', () => {
                renderGallery();
                galleryView.classList.add('visible');
                history.pushState({ gallery: true }, '');
            });

            // CHAT
            const chatView = document.getElementById('chat-view');
            const cMessages = document.getElementById('c-messages');
            const cText = document.getElementById('c-text');
            const cSend = document.getElementById('c-send');
            const cAttach = document.getElementById('c-attach');
            const chatFileInput = document.getElementById('chat-file-input');
            const messagesRef = db.ref('messages');
            const onceViewer = document.getElementById('once-viewer');
            const onceContent = document.getElementById('once-content');
            let chatListener = null;
            let onceMode = false;

            function renderChat() {
                cMessages.innerHTML = '';
                if (chatListener) {
                    messagesRef.off('value', chatListener);
                    chatListener = null;
                }
                chatListener = messagesRef.orderByChild('timestamp').on('value', (snapshot) => {
                    cMessages.innerHTML = '';
                    if (!snapshot.exists()) {
                        cMessages.innerHTML = '<div class="c-empty"><div class="c-empty-icon">💬</div>Noch keine Nachrichten.<br>Starte das Gespräch!</div>';
                        return;
                    }
                    const msgs = [];
                    snapshot.forEach(child => {
                        const val = child.val();
                        if (val) msgs.push({ id: child.key, text: val.text || '', media: val.media || '', mediaType: val.mediaType || '', author: val.author || 'Unbekannt', timestamp: val.timestamp || 0, date: val.date || '', once: val.once || false });
                    });
                    msgs.forEach(msg => {
                        const isMine = msg.author === currentUser;
                        const el = document.createElement('div');
                        el.className = 'c-msg ' + (isMine ? 'mine' : 'theirs');
                        const authorName = msg.author.charAt(0).toUpperCase() + msg.author.slice(1);
                        let mediaHtml = '';
                        if (msg.once) {
                            if (!isMine) {
                                mediaHtml = `<div class="c-msg-once-badge">🔒 1x ansehen</div><div><button class="c-msg-once-btn" data-id="${msg.id}" data-media="${encodeURIComponent(msg.media)}" data-media-type="${msg.mediaType}" data-author="${authorName}" data-date="${msg.date}">👁️ Einmal ansehen</button></div>`;
                            } else {
                                mediaHtml = `<div class="c-msg-once-badge">🔒 1x gesendet</div>`;
                            }
                        } else if (msg.media) {
                            if (msg.mediaType === 'video') {
                                mediaHtml = `<div class="c-msg-media"><video src="${msg.media}" controls></video></div>`;
                            } else {
                                mediaHtml = `<div class="c-msg-media"><img src="${msg.media}" alt=""></div>`;
                            }
                        }
                        el.innerHTML = `<div class="c-msg-author">${authorName}</div>${mediaHtml}<div class="c-msg-text">${msg.text ? escapeHtml(msg.text) : ''}</div><div class="c-msg-time">${msg.date}</div><button class="c-msg-delete" data-id="${msg.id}">✕</button>`;
                        cMessages.appendChild(el);
                    });
                    cMessages.scrollTop = cMessages.scrollHeight;
                    cMessages.querySelectorAll('.c-msg-delete').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (confirm('Nachricht löschen?')) {
                                messagesRef.child(btn.dataset.id).remove();
                            }
                        });
                    });
                    cMessages.querySelectorAll('.c-msg-once-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const media = decodeURIComponent(btn.dataset.media);
                            const mediaType = btn.dataset.mediaType;
                            const author = btn.dataset.author;
                            const date = btn.dataset.date;
                            const msgId = btn.dataset.id;
                            openOnceViewer(media, mediaType, author, date, msgId);
                        });
                    });
                }, (err) => {
                    console.error('CHAT ERROR:', err);
                    cMessages.innerHTML = '<div class="c-empty"><div class="c-empty-icon">⚠️</div>Fehler: ' + err.message + '</div>';
                });
            }

            function openOnceViewer(media, mediaType, author, date, msgId) {
                onceContent.innerHTML = '';
                if (onceViewer._timer) clearInterval(onceViewer._timer);
                if (mediaType === 'video') {
                    const vid = document.createElement('video');
                    vid.src = media;
                    vid.controls = true;
                    vid.autoplay = true;
                    vid.style.maxWidth = '100%';
                    vid.style.maxHeight = '75vh';
                    onceContent.appendChild(vid);
                } else {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        canvas.style.maxWidth = '100%';
                        canvas.style.maxHeight = '75vh';
                        canvas.style.objectFit = 'contain';
                        canvas.style.borderRadius = '4px';
                        const overlay = document.createElement('div');
                        overlay.className = 'once-overlay';
                        canvas.style.position = 'relative';
                        onceContent.appendChild(canvas);
                        onceContent.appendChild(overlay);
                    };
                    img.src = media;
                }
                onceViewer.classList.add('visible');
                history.pushState({ once: true }, '');
                onceViewer._msgId = msgId;
                let seconds = 15;
                const timerEl = document.getElementById('once-timer');
                timerEl.textContent = 'Läuft in ' + seconds + ' Sekunden...';
                onceViewer._timer = setInterval(() => {
                    seconds--;
                    timerEl.textContent = 'Läuft in ' + seconds + ' Sekunden...';
                    if (seconds <= 0) {
                        clearInterval(onceViewer._timer);
                        closeOnceViewer();
                    }
                }, 1000);
            }

            document.getElementById('once-close').addEventListener('click', () => {
                closeOnceViewer();
            });

            function closeOnceViewer() {
                const msgId = onceViewer._msgId;
                if (onceViewer._timer) clearInterval(onceViewer._timer);
                onceViewer.classList.remove('visible');
                onceContent.innerHTML = '';
                document.getElementById('once-timer').textContent = '';
                history.back();
                if (msgId) {
                    messagesRef.child(msgId).remove().then(() => {
                        console.log('1x Nachricht gelöscht');
                    });
                }
            }

            // Screenshot-Schutz
            function enableProtection() {
                document.addEventListener('contextmenu', blockAction);
                document.addEventListener('keydown', blockKeys);
                document.addEventListener('dragstart', blockAction);
                document.addEventListener('selectstart', blockAction);
            }
            function disableProtection() {
                document.removeEventListener('contextmenu', blockAction);
                document.removeEventListener('keydown', blockKeys);
                document.removeEventListener('dragstart', blockAction);
                document.removeEventListener('selectstart', blockAction);
            }
            function blockAction(e) { e.preventDefault(); return false; }
            function blockKeys(e) {
                if (onceViewer.classList.contains('visible')) {
                    if (e.key === 'PrintScreen' || (e.metaKey && (e.key === 's' || e.key === 'p' || e.key === 'u'))) {
                        e.preventDefault();
                        return false;
                    }
                }
            }

            window.addEventListener('popstate', (e) => {
                if (onceViewer.classList.contains('visible')) {
                    closeOnceViewer();
                } else if (lightbox.classList.contains('visible')) {
                    lightbox.classList.remove('visible');
                    lightboxVideo.pause();
                    lightboxVideo.src = '';
                } else if (chatView.classList.contains('visible')) {
                    chatView.classList.remove('visible');
                    if (chatListener) { messagesRef.off('value', chatListener); chatListener = null; }
                } else if (galleryView.classList.contains('visible')) {
                    galleryView.classList.remove('visible');
                    renderGallery();
                }
            });

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function sendMessage(text, media, mediaType) {
                if (!text && !media) return;
                messagesRef.push({
                    text: text || '',
                    media: media || '',
                    mediaType: mediaType || '',
                    author: currentUser,
                    timestamp: Date.now(),
                    date: new Date().toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' }),
                    once: onceMode
                }).then(() => {
                    onceMode = false;
                    document.querySelector('.c-once-btn').classList.remove('active');
                }).catch(err => {
                    console.error('CHAT SEND ERROR:', err);
                    alert('Fehler beim Senden: ' + err.message);
                });
            }

            cSend.addEventListener('click', () => {
                const text = cText.value.trim();
                if (!text) return;
                sendMessage(text);
                cText.value = '';
            });

            cText.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    cSend.click();
                }
            });

            cAttach.addEventListener('click', () => chatFileInput.click());

            document.getElementById('c-once').addEventListener('click', () => {
                onceMode = !onceMode;
                document.querySelector('.c-once-btn').classList.toggle('active', onceMode);
            });

            chatFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const maxSize = file.type.startsWith('video/') ? 15*1024*1024 : 5*1024*1024;
                if (file.size > maxSize) {
                    alert(file.type.startsWith('video/') ? 'Max. 15MB für Videos!' : 'Max. 5MB für Fotos!');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const mediaData = ev.target.result;
                    const mediaType = file.type.startsWith('video/') ? 'video' : 'image';
                    sendMessage('', mediaData, mediaType);
                };
                reader.readAsDataURL(file);
                chatFileInput.value = '';
            });

            document.getElementById('open-chat').addEventListener('click', () => {
                renderChat();
                chatView.classList.add('visible');
                enableProtection();
                history.pushState({ chat: true }, '');
            });

            document.getElementById('c-back').addEventListener('click', () => {
                chatView.classList.remove('visible');
                disableProtection();
                history.back();
                if (chatListener) { messagesRef.off('value', chatListener); chatListener = null; }
            });

            // iOS Keyboard Handling
            function handleIOSKeyboard() {
                if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                    window.addEventListener('resize', () => {
                        if (chatView.classList.contains('visible')) {
                            const vh = window.innerHeight * 0.01;
                            document.documentElement.style.setProperty('--vh', vh + 'px');
                            cMessages.scrollTop = cMessages.scrollHeight;
                        }
                    });
                    cText.addEventListener('focus', () => {
                        setTimeout(() => {
                            cMessages.scrollTop = cMessages.scrollHeight;
                        }, 300);
                    });
                }
            }
            handleIOSKeyboard();
        }
    });
    </script>
</body>
</html>

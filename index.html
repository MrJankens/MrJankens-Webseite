<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L & K | 19.02.2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            overflow: hidden;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 99999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 380px;
            text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .login-heart { font-size: 4rem; margin-bottom: 15px; display: inline-block; animation: heartbeat 1.4s infinite ease-in-out; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 25% { transform: scale(1.15); } 40% { transform: scale(1.05); } 60% { transform: scale(1.15); } }
        .login-title { font-size: 1.5rem; font-weight: 800; color: #4a154b; margin-bottom: 5px; }
        .login-subtitle { font-size: 0.9rem; color: #888; margin-bottom: 25px; }
        .login-input {
            width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 1rem; margin-bottom: 12px; outline: none; transition: border-color 0.3s;
            background: #fafafa;
        }
        .login-input:focus { border-color: #d11a5b; background: #fff; }
        .login-input.error { border-color: #ff4444; animation: shake 0.4s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(45deg, #ff4081, #d11a5b);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(209, 26, 91, 0.3);
            transition: all 0.2s ease;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(209, 26, 91, 0.5); }
        .login-btn:active { transform: translateY(0); }
        .login-error { color: #ff4444; font-size: 0.85rem; margin-top: 10px; min-height: 20px; font-weight: 600; }
        .stay-logged { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; font-size: 0.9rem; color: #555; }
        .stay-logged input[type="checkbox"] { width: 18px; height: 18px; accent-color: #d11a5b; cursor: pointer; }
        .stay-logged label { cursor: pointer; user-select: none; }

        /* WELCOME SPLASH */
        #welcome-splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 999999; opacity: 0; visibility: hidden; pointer-events: none;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #welcome-splash.visible { opacity: 1; visibility: visible; }
        #welcome-splash.fade-out { opacity: 0; }
        .splash-content { text-align: center; animation: splashPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes splashPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .splash-heart { font-size: 6rem; margin-bottom: 20px; display: inline-block; animation: heartbeat 1.4s infinite ease-in-out; }
        .splash-text { font-size: 2rem; font-weight: 800; color: white; text-shadow: 0 0 30px rgba(255, 255, 255, 0.5); }
        .splash-name { color: #ff6b9d; }

        /* LOVE CARD */
        #love-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ffeef8 0%, #ffd1dc 50%, #fbc2eb 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999999; overflow: hidden;
            opacity: 0; visibility: hidden; transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #love-overlay.visible { opacity: 1; visibility: visible; }
        .love-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px; padding: 40px 25px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 15px 35px rgba(253, 114, 148, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative; z-index: 10;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, cardFloat 6s ease-in-out infinite;
            user-select: none; -webkit-user-select: none;
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-8px) translateX(5px); }
            50% { transform: translateY(-3px) translateX(-3px); }
            75% { transform: translateY(-10px) translateX(4px); }
        }
        .love-card * { user-select: none; -webkit-user-select: none; cursor: default; }

        /* 3D Effekt nur für Buttons */
        .btn-3d {
            transition: all 0.2s ease;
            transform-style: preserve-3d;
        }
        .btn-3d:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(209, 26, 91, 0.5);
        }

        .main-heart { font-size: 5rem; margin-bottom: 10px; display: inline-block; animation: heartbeat 1.4s infinite ease-in-out; cursor: pointer; }
        .initials { font-size: 2.5rem; font-weight: 800; color: #d11a5b; letter-spacing: 2px; margin-bottom: 5px; text-align: center; }
        .date-badge { display: inline-block; background: #d11a5b; color: white; padding: 5px 15px; border-radius: 20px; font-size: 1rem; font-weight: 600; margin-bottom: 15px; }
        .message { font-size: 1.5rem; font-weight: 700; color: #4a154b; margin-bottom: 15px; }
        .counter { font-size: 0.95rem; color: #615061; background: rgba(255, 255, 255, 0.8); padding: 12px; border-radius: 12px; margin-bottom: 20px; }
        .counter strong { color: #d11a5b; font-size: 1.05rem; display: block; margin-top: 4px; }
        .love-btn { background: linear-gradient(45deg, #ff4081, #d11a5b); color: white; border: none; padding: 12px 28px; font-size: 1rem; font-weight: 600; border-radius: 50px; box-shadow: 0 5px 15px rgba(209, 26, 91, 0.3); cursor: pointer; }
        .secret-msg { margin-top: 15px; font-size: 1rem; font-weight: 600; color: #d11a5b; min-height: 25px; transition: opacity 0.3s ease; opacity: 0; }
        .logout-btn {
            position: absolute; top: 15px; right: 15px; background: rgba(209, 26, 91, 0.1);
            color: #d11a5b; border: none; width: 36px; height: 36px; border-radius: 50%;
            font-size: 1.2rem; transition: all 0.2s ease; z-index: 20;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .logout-btn:hover { background: #d11a5b; color: white; transform: scale(1.1); }
        .gallery-btn {
            background: rgba(209, 26, 91, 0.1); color: #d11a5b; border: none; padding: 10px 20px;
            font-size: 0.95rem; font-weight: 600; border-radius: 50px; margin-top: 15px; cursor: pointer;
        }
        .falling-heart { position: absolute; top: -5%; user-select: none; pointer-events: none; animation: fall linear forwards; z-index: 1; }
        @keyframes fall { 0% { transform: translateY(-10%) rotate(0deg); opacity: 0.9; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes burstUp { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-50vh) translateX(var(--bx)) rotate(var(--br)); opacity: 0; } }

        /* FOTO GALERIE - EIGENE SEITE */
        #gallery-view {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 99999999;
            display: flex; flex-direction: column;
            opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease;
            overflow: hidden;
        }
        #gallery-view.visible { opacity: 1; visibility: visible; }
        .gallery-topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; flex-shrink: 0;
        }
        .gallery-back {
            background: rgba(255, 255, 255, 0.15); color: white; border: none; padding: 10px 20px;
            border-radius: 50px; font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; gap: 8px;
        }
        .gallery-back:hover { background: rgba(255, 255, 255, 0.25); transform: translateX(-3px); }
        .gallery-page-title { color: white; font-size: 1.5rem; font-weight: 800; }
        .gallery-count { color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; }
        .gallery-content {
            flex: 1; overflow-y: auto; padding: 0 30px 30px;
        }
        .gallery-upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.25); border-radius: 20px;
            padding: 40px; text-align: center; margin-bottom: 30px;
            transition: all 0.3s ease; cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
        }
        .gallery-upload-area:hover { border-color: #ff6b9d; background: rgba(255, 107, 157, 0.05); }
        .gallery-upload-icon { font-size: 3rem; margin-bottom: 10px; }
        .gallery-upload-text { color: rgba(255, 255, 255, 0.7); font-size: 1.1rem; margin-bottom: 5px; }
        .gallery-upload-sub { color: rgba(255, 255, 255, 0.4); font-size: 0.85rem; }
        #file-input { display: none; }
        .gallery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
        }
        .gallery-item {
            position: relative; border-radius: 16px; overflow: hidden;
            aspect-ratio: 1; background: rgba(255, 255, 255, 0.05);
            animation: popIn 0.4s ease forwards; cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .gallery-item:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            padding: 15px 12px 12px; display: flex; justify-content: space-between; align-items: flex-end;
        }
        .gallery-item-author { color: white; font-size: 0.85rem; font-weight: 600; }
        .gallery-item-date { color: rgba(255, 255, 255, 0.5); font-size: 0.75rem; }
        .gallery-item-delete {
            background: rgba(255, 50, 50, 0.8); color: white; border: none; width: 30px; height: 30px;
            border-radius: 50%; font-size: 1rem; cursor: pointer; opacity: 0; transition: all 0.2s;
            position: absolute; top: 10px; right: 10px;
        }
        .gallery-item:hover .gallery-item-delete { opacity: 1; }
        .gallery-item-delete:hover { background: #ff0000; transform: scale(1.15); }
        .gallery-empty {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px;
            color: rgba(255, 255, 255, 0.4);
        }
        .gallery-empty-icon { font-size: 4rem; margin-bottom: 15px; }
        .gallery-empty-text { font-size: 1.2rem; }

        /* Foto Lightbox */
        #photo-lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.95); z-index: 999999999;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
            cursor: pointer;
        }
        #photo-lightbox.visible { opacity: 1; visibility: visible; }
        #photo-lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; box-shadow: 0 0 60px rgba(0,0,0,0.5); }
        .lightbox-close {
            position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.2);
            color: white; border: none; width: 45px; height: 45px; border-radius: 50%;
            font-size: 1.5rem; cursor: pointer; transition: all 0.2s;
        }
        .lightbox-close:hover { background: #d11a5b; }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-container">
            <div class="login-heart">❤️</div>
            <div class="login-title">Willkommen zurück</div>
            <div class="login-subtitle">Melde dich an um fortzufahren</div>
            <input type="text" class="login-input" id="username" placeholder="Benutzername" autocomplete="off">
            <input type="password" class="login-input" id="password" placeholder="Passwort">
            <div class="stay-logged">
                <input type="checkbox" id="stay-logged">
                <label for="stay-logged">Auf diesem Gerät angemeldet bleiben</label>
            </div>
            <button class="login-btn" id="login-btn">Anmelden 💖</button>
            <div class="login-error" id="login-error"></div>
        </div>
    </div>

    <!-- WELCOME SPLASH -->
    <div id="welcome-splash">
        <div class="splash-content">
            <div class="splash-heart">❤️</div>
            <div class="splash-text">Willkommen, <span class="splash-name" id="splash-name"></span>! 💕</div>
        </div>
    </div>

    <!-- LOVE CARD -->
    <div id="love-overlay">
        <div class="falling-hearts-container" id="hearts-bg"></div>
        <div class="love-card" id="love-card">
            <button class="logout-btn btn-3d" id="logout-btn" title="Abmelden">⏻</button>
            <div class="main-heart" id="pulsing-heart">❤️</div>
            <div class="initials">L ♥ K</div>
            <div class="date-badge">19.02.2026</div>
            <div class="message">Ich liebe dich!</div>
            <div class="counter" id="timer">Berechne unsere Zeit...</div>
            <button class="love-btn btn-3d" id="surprise-btn">Drück mich! 💖</button>
            <button class="gallery-btn btn-3d" id="open-gallery">📷 Unsere Fotos</button>
            <div class="secret-msg" id="secret-text"></div>
        </div>
    </div>

    <!-- FOTO GALERIE - EIGENE SEITE -->
    <div id="gallery-view">
        <div class="gallery-topbar">
            <button class="gallery-back" id="close-gallery">← Zurück</button>
            <div>
                <div class="gallery-page-title">📷 Unsere Galerie</div>
                <div class="gallery-count" id="gallery-count"></div>
            </div>
            <div style="width: 100px;"></div>
        </div>
        <div class="gallery-content">
            <div class="gallery-upload-area" id="upload-area">
                <div class="gallery-upload-icon">📸</div>
                <div class="gallery-upload-text">Foto hochladen</div>
                <div class="gallery-upload-sub">Klicke hier oder ziehe ein Foto hierher</div>
                <input type="file" id="file-input" accept="image/*">
            </div>
            <div class="gallery-grid" id="gallery-grid"></div>
        </div>
    </div>

    <!-- PHOTO LIGHTBOX -->
    <div id="photo-lightbox">
        <button class="lightbox-close">✕</button>
        <img src="" alt="Foto" id="lightbox-img">
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // ==================== LOGIN LOGIK ====================
        const accounts = { kevin: "KevinLea0909", lea: "KevinLea0909" };
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const loginScreen = document.getElementById('login-screen');
        const stayLoggedCheck = document.getElementById('stay-logged');
        const welcomeSplash = document.getElementById('welcome-splash');
        const splashName = document.getElementById('splash-name');
        const loveOverlay = document.getElementById('love-overlay');
        let currentUser = null;

        const savedUser = localStorage.getItem('lk_user');
        if (savedUser && accounts[savedUser]) {
            loginScreen.classList.add('hidden');
            showSplash(savedUser);
            return;
        }

        function attemptLogin() {
            const user = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;
            if (accounts[user] && accounts[user] === pass) {
                if (stayLoggedCheck.checked) {
                    localStorage.setItem('lk_user', user);
                }
                loginScreen.classList.add('hidden');
                showSplash(user);
            } else {
                loginError.textContent = 'Benutzername oder Passwort ist falsch.';
                usernameInput.classList.add('error');
                passwordInput.classList.add('error');
                setTimeout(() => { usernameInput.classList.remove('error'); passwordInput.classList.remove('error'); }, 500);
                passwordInput.value = '';
            }
        }
        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
        usernameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordInput.focus(); });

        // ==================== WELCOME SPLASH ====================
        function showSplash(user) {
            splashName.textContent = user.charAt(0).toUpperCase() + user.slice(1);
            welcomeSplash.classList.add('visible');
            setTimeout(() => {
                welcomeSplash.classList.add('fade-out');
                setTimeout(() => {
                    welcomeSplash.classList.remove('visible', 'fade-out');
                    loveOverlay.classList.add('visible');
                    currentUser = user;
                    initLoveCard(user);
                }, 600);
            }, 2000);
        }

        // ==================== LOVE CARD ====================
        function initLoveCard(user) {
            // Live-Zähler
            const startDate = new Date('2026-02-19T00:00:00');
            function updateCounter() {
                const now = new Date();
                const diff = now - startDate;
                const isFuture = diff < 0;
                const absDiff = Math.abs(diff);
                const days = Math.floor(absDiff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((absDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((absDiff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((absDiff % (1000 * 60)) / 1000);
                const timerEl = document.getElementById('timer');
                if (isFuture) {
                    timerEl.innerHTML = `Noch bis zu unserem Tag: <strong>${days} Tage, ${hours} Std, ${minutes} Min, ${seconds} Sek</strong>`;
                } else {
                    timerEl.innerHTML = `Wir sind glücklich zusammen seit: <strong>${days} Tagen, ${hours} Std, ${minutes} Min, ${seconds} Sek</strong>`;
                }
            }
            setInterval(updateCounter, 1000);
            updateCounter();

            // Fallende Herzen
            const heartsBg = document.getElementById('hearts-bg');
            function createFallingHeart() {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerHTML = ['❤️', '💖', '💝', '💕', '🌸', '✨'][Math.floor(Math.random() * 6)];
                heart.style.left = Math.random() * 100 + 'vw';
                const duration = Math.random() * 3 + 4;
                heart.style.animationDuration = duration + 's';
                heart.style.fontSize = (Math.random() * 15 + 12) + 'px';
                heartsBg.appendChild(heart);
                setTimeout(() => { heart.remove(); }, duration * 1000);
            }
            setInterval(createFallingHeart, 350);

            // Überraschungs-Button
            const sweetMessages = [
                "Du bist mein absoluter Lieblingsmensch! 🥰",
                "Jeder Tag mit dir ist mein Lieblingstag. 🌸",
                "L + K = Für immer und ewig! 🔐",
                "Danke, dass es dich gibt! ❤️",
                "Du machst meine Welt so viel bunter! 🌈",
                "Mein Herz schlägt nur für dich! 💑"
            ];
            const surpriseBtn = document.getElementById('surprise-btn');
            const secretText = document.getElementById('secret-text');

            function startSurprise() {
                secretText.style.opacity = 0;
                setTimeout(() => {
                    secretText.innerHTML = sweetMessages[Math.floor(Math.random() * sweetMessages.length)];
                    secretText.style.opacity = 1;
                }, 200);
                for (let i = 0; i < 8; i++) { createBurstHeart(); }
            }
            surpriseBtn.addEventListener('click', startSurprise);
            document.getElementById('pulsing-heart').addEventListener('click', startSurprise);

            function createBurstHeart() {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerHTML = ['❤️', '💖', '💕'][Math.floor(Math.random() * 3)];
                heart.style.left = (Math.random() * 60 + 20) + 'vw';
                heart.style.top = '75%';
                const duration = Math.random() * 1.5 + 1.5;
                heart.style.animationDuration = duration + 's';
                heart.style.setProperty('--bx', (Math.random() - 0.5) * 100 + 'px');
                heart.style.setProperty('--br', (Math.random() - 0.5) * 360 + 'deg');
                heart.style.animation = 'none';
                setTimeout(() => { heart.style.animation = `burstUp ${duration}s ease-out forwards`; }, 10);
                heartsBg.appendChild(heart);
                setTimeout(() => { heart.remove(); }, duration * 1000);
            }

            // Logout
            document.getElementById('logout-btn').addEventListener('click', function() {
                loveOverlay.classList.remove('visible');
                localStorage.removeItem('lk_user');
                currentUser = null;
                setTimeout(() => {
                    loginScreen.classList.remove('hidden');
                    usernameInput.value = '';
                    passwordInput.value = '';
                    loginError.textContent = '';
                }, 800);
            });

            // ==================== FOTO GALERIE ====================
            const galleryView = document.getElementById('gallery-view');
            const galleryGrid = document.getElementById('gallery-grid');
            const galleryCount = document.getElementById('gallery-count');
            const fileInput = document.getElementById('file-input');
            const lightbox = document.getElementById('photo-lightbox');
            const lightboxImg = document.getElementById('lightbox-img');

            function getPhotos() {
                return JSON.parse(localStorage.getItem('lk_photos') || '[]');
            }
            function savePhotos(photos) {
                localStorage.setItem('lk_photos', JSON.stringify(photos));
            }
            function renderGallery() {
                const photos = getPhotos();
                galleryGrid.innerHTML = '';
                galleryCount.textContent = `${photos.length} Foto${photos.length !== 1 ? 's' : ''}`;
                if (photos.length === 0) {
                    galleryGrid.innerHTML = '<div class="gallery-empty"><div class="gallery-empty-icon">📷</div><div class="gallery-empty-text">Noch keine Fotos vorhanden.<br>Drück auf "Foto hochladen" um loszulegen!</div></div>';
                    return;
                }
                photos.forEach((photo, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.innerHTML = `
                        <img src="${photo.data}" alt="Foto von ${photo.author}">
                        <div class="gallery-item-overlay">
                            <div>
                                <div class="gallery-item-author">📷 ${photo.author.charAt(0).toUpperCase() + photo.author.slice(1)}</div>
                                <div class="gallery-item-date">${photo.date}</div>
                            </div>
                        </div>
                        <button class="gallery-item-delete" data-index="${index}">✕</button>
                    `;
                    item.addEventListener('click', (e) => {
                        if (e.target.classList.contains('gallery-item-delete')) return;
                        lightboxImg.src = photo.data;
                        lightbox.classList.add('visible');
                    });
                    galleryGrid.appendChild(item);
                });
                galleryGrid.querySelectorAll('.gallery-item-delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(btn.dataset.index);
                        const photos = getPhotos();
                        photos.splice(idx, 1);
                        savePhotos(photos);
                        renderGallery();
                    });
                });
            }

            document.getElementById('open-gallery').addEventListener('click', () => {
                renderGallery();
                galleryView.classList.add('visible');
            });
            document.getElementById('close-gallery').addEventListener('click', () => {
                galleryView.classList.remove('visible');
            });
            document.getElementById('upload-area').addEventListener('click', () => {
                fileInput.click();
            });
            document.querySelector('.lightbox-close').addEventListener('click', () => {
                lightbox.classList.remove('visible');
            });
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) lightbox.classList.remove('visible');
            });
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) {
                    alert('Foto ist zu groß! Max. 5MB.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const photos = getPhotos();
                    photos.unshift({ data: ev.target.result, author: currentUser, date: new Date().toLocaleDateString('de-DE') });
                    savePhotos(photos);
                    renderGallery();
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            });
        }
    });
    </script>
</body>
</html>
